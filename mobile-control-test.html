<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>ミニアランド v0.6.15.31 スマホ操作確認</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      width:100%;
      height:100%;
      margin:0;
      overflow:hidden;
      background:#26364a;
      color:#3f3128;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      touch-action:none;
      overscroll-behavior:none;
    }
    body{
      display:grid;
      place-items:center;
      padding:10px;
    }
    .phone{
      width:min(100vw - 20px,430px);
      height:min(100dvh - 20px,840px);
      border:4px solid #142338;
      border-radius:18px;
      overflow:hidden;
      background:#fff3cf;
      box-shadow:0 10px 28px rgba(0,0,0,.35);
      position:relative;
    }
    .bar{
      position:absolute;
      left:0;
      right:0;
      top:0;
      z-index:2;
      min-height:34px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:5px 8px;
      background:linear-gradient(#fff8dc,#dfc793);
      border-bottom:2px solid #715030;
      font-size:11px;
      font-weight:900;
    }
    .bar b{color:#253f6c}
    .bar span{color:#6c4c37}
    iframe{
      position:absolute;
      inset:34px 0 0;
      width:100%;
      height:calc(100% - 34px);
      border:0;
      display:block;
      background:#111;
    }
  </style>
</head>
<body>
  <main class="phone">
    <div class="bar">
      <b>v0.6.15.31 操作確認</b>
      <span>DEVのINPUT HUDかキー i で入力表示</span>
    </div>
    <iframe src="index.html" title="ミニアランド"></iframe>
  </main>
</body>
</html>
