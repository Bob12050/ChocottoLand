<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <title>ミニアランド v0.6.15.35 モーション確認室</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      width:100%;
      min-height:100%;
      margin:0;
      background:#d8ecf3;
      color:#3f3128;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
      touch-action:manipulation;
    }
    body{
      padding:10px;
      background:
        linear-gradient(rgba(255,255,255,.58),rgba(255,255,255,.28)),
        repeating-linear-gradient(0deg, rgba(41,65,93,.05) 0 1px, transparent 1px 16px),
        #cfeaf2;
    }
    button,input,select,label{font:inherit}
    .app{
      width:min(100%,860px);
      margin:0 auto;
      border:3px solid #263f6f;
      background:#fff8dc;
      box-shadow:0 6px 18px rgba(32,43,64,.22);
    }
    .topbar{
      min-height:30px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:5px 8px;
      background:linear-gradient(#fffdf0,#dfc783);
      border-bottom:2px solid #795832;
      color:#263f6f;
      font-size:12px;
      font-weight:900;
    }
    .topbar span{color:#7a4b28}
    .panel{
      padding:8px;
      background:#fff1c8;
      border-bottom:2px solid #cba96b;
    }
    .controls{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:6px;
    }
    .control{
      min-height:34px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:6px;
      padding:5px 7px;
      border:2px solid #31436f;
      background:linear-gradient(#ffffff,#e9f4ff);
      font-size:11px;
      font-weight:800;
      color:#31436f;
    }
    .control.full{grid-column:1/-1}
    .control input[type="range"]{width:120px;max-width:48vw}
    .control input[type="checkbox"]{width:19px;height:19px;accent-color:#476fb3}
    .btn{
      min-width:78px;
      min-height:28px;
      border:2px solid #263f6f;
      border-radius:7px;
      background:linear-gradient(#ffffff,#bfe6ff);
      color:#263f6f;
      font-size:12px;
      font-weight:900;
      box-shadow:inset 0 1px #fff,0 2px 0 #9a7441;
    }
    .btn:active{transform:translateY(1px);box-shadow:inset 0 1px #fff,0 1px 0 #9a7441}
    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:8px;
      padding:8px;
      background:#f7dfaa;
    }
    .card{
      border:2px solid #263f6f;
      background:#fffaf0;
      box-shadow:inset 0 0 0 2px rgba(255,255,255,.9);
    }
    .cardHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      min-height:26px;
      padding:4px 6px;
      border-bottom:2px solid #cba96b;
      background:linear-gradient(#eef8ff,#c7e9ff);
      color:#263f6f;
      font-size:11px;
      font-weight:900;
    }
    .cardHead small{color:#8b5a35;font-weight:900}
    .stage{
      position:relative;
      width:100%;
      aspect-ratio:1.08/1;
      min-height:142px;
      display:grid;
      place-items:center;
      background:
        linear-gradient(90deg, rgba(57,72,108,.08) 1px, transparent 1px),
        linear-gradient(rgba(57,72,108,.08) 1px, transparent 1px),
        #f9f6e7;
      background-size:16px 16px;
      overflow:hidden;
    }
    canvas{
      width:100%;
      height:100%;
      display:block;
      image-rendering:pixelated;
      image-rendering:crisp-edges;
    }
    .note{
      padding:7px 8px 9px;
      border-top:2px solid #cba96b;
      background:#fff8dc;
      color:#5f4935;
      font-size:11px;
      line-height:1.55;
      font-weight:700;
    }
    .note b{color:#263f6f}
    @media (min-width:680px){
      body{padding:16px}
      .controls{grid-template-columns:repeat(4,minmax(0,1fr))}
      .control.full{grid-column:auto}
      .grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="topbar">
      <b>ミニアランド モーション確認室</b>
      <span>v0.6.15.35</span>
    </div>

    <section class="panel">
      <div class="controls">
        <div class="control">
          <span>再生</span>
          <button id="playBtn" class="btn" type="button">停止</button>
        </div>
        <label class="control">
          <span>速度</span>
          <input id="speedRange" type="range" min="4" max="14" value="8">
        </label>
        <label class="control">
          <span>サイズ</span>
          <input id="sizeRange" type="range" min="56" max="108" value="82">
        </label>
        <label class="control">
          <span>装備ガイド</span>
          <input id="gearToggle" type="checkbox" checked>
        </label>
        <label class="control">
          <span>基準線</span>
          <input id="guideToggle" type="checkbox" checked>
        </label>
        <label class="control">
          <span>背景</span>
          <select id="bgSelect">
            <option value="grid">方眼</option>
            <option value="field">草地</option>
            <option value="plain">無地</option>
          </select>
        </label>
      </div>
    </section>

    <section id="motionGrid" class="grid"></section>

    <p class="note">
      <b>装備について:</b>
      今後はこの素体の上に、武器・頭装備・背中装備をレイヤーとして重ねられます。
      最初は現在のCanvas重ね描きで進め、見た目が固まったら「方向別・モーション別の装備PNG」へ段階的に増やすのが安全です。
    </p>
  </main>

  <script>
  (function(){
    "use strict";

    var ASSET_BASE = "assets/characters/";
    var panels = [
      { id:"frontIdle", label:"前 停止", tag:"base", view:"front", frames:["player_front.png"], kind:"idle" },
      { id:"frontWalk", label:"前 歩き", tag:"4コマ", view:"front", frames:["player_front_walk_a.png","player_front_walk_b.png","player_front_walk_c.png","player_front_walk_d.png"], kind:"walk" },
      { id:"backIdle", label:"後ろ 停止", tag:"base", view:"back", frames:["player_back.png"], kind:"idle" },
      { id:"backWalk", label:"後ろ 歩き", tag:"4コマ", view:"back", frames:["player_back_walk_a.png","player_back_walk_b.png","player_back_walk_c.png","player_back_walk_d.png"], kind:"walk" },
      { id:"rightIdle", label:"右 停止", tag:"base", view:"right", frames:["player_side.png"], kind:"idle" },
      { id:"leftIdle", label:"左 停止", tag:"反転確認", view:"left", frames:["player_side.png"], kind:"idle", mirror:true },
      { id:"rightWalk", label:"右 歩き", tag:"4コマ", view:"right", frames:["player_side_walk_a.png","player_side_walk_b.png","player_side_walk_c.png","player_side_walk_d.png"], kind:"walk" },
      { id:"leftWalk", label:"左 歩き", tag:"反転4コマ", view:"left", frames:["player_side_walk_a.png","player_side_walk_b.png","player_side_walk_c.png","player_side_walk_d.png"], kind:"walk", mirror:true },
      { id:"frontAttack", label:"前 攻撃", tag:"剣", view:"front", frames:["player_attack_front_a.png","player_attack_front_b.png","player_attack_front_c.png","player_attack_front_d.png"], kind:"attack" },
      { id:"backAttack", label:"後ろ 攻撃", tag:"剣", view:"back", frames:["player_attack_back_a.png","player_attack_back_b.png","player_attack_back_c.png","player_attack_back_d.png"], kind:"attack" },
      { id:"rightAttack", label:"右 攻撃", tag:"剣", view:"right", frames:["player_attack_side_a.png","player_attack_side_b.png","player_attack_side_c.png","player_attack_side_d.png"], kind:"attack" },
      { id:"leftAttack", label:"左 攻撃", tag:"反転確認", view:"left", frames:["player_attack_side_a.png","player_attack_side_b.png","player_attack_side_c.png","player_attack_side_d.png"], kind:"attack", mirror:true }
    ];

    var state = {
      playing:true,
      speed:8,
      size:82,
      showGear:true,
      showGuides:true,
      bg:"grid",
      time:0,
      last:0
    };

    var images = {};
    var views = [];

    function loadImage(name){
      if(images[name]) return images[name];
      var img = new Image();
      img.decoding = "async";
      img.src = ASSET_BASE + name;
      images[name] = img;
      return img;
    }

    function build(){
      var grid = document.getElementById("motionGrid");
      panels.forEach(function(panel){
        panel.frames.forEach(loadImage);

        var card = document.createElement("article");
        card.className = "card";

        var head = document.createElement("div");
        head.className = "cardHead";
        head.innerHTML = "<b></b><small></small>";
        head.querySelector("b").textContent = panel.label;
        head.querySelector("small").textContent = panel.tag;

        var stage = document.createElement("div");
        stage.className = "stage";

        var canvas = document.createElement("canvas");
        canvas.width = 256;
        canvas.height = 238;
        stage.appendChild(canvas);

        card.appendChild(head);
        card.appendChild(stage);
        grid.appendChild(card);
        views.push({ panel:panel, canvas:canvas, ctx:canvas.getContext("2d") });
      });
    }

    function setupControls(){
      var playBtn = document.getElementById("playBtn");
      var speedRange = document.getElementById("speedRange");
      var sizeRange = document.getElementById("sizeRange");
      var gearToggle = document.getElementById("gearToggle");
      var guideToggle = document.getElementById("guideToggle");
      var bgSelect = document.getElementById("bgSelect");

      playBtn.addEventListener("click", function(){
        state.playing = !state.playing;
        playBtn.textContent = state.playing ? "停止" : "再生";
      });
      speedRange.addEventListener("input", function(){ state.speed = Number(speedRange.value) || 8; });
      sizeRange.addEventListener("input", function(){ state.size = Number(sizeRange.value) || 82; });
      gearToggle.addEventListener("change", function(){ state.showGear = gearToggle.checked; });
      guideToggle.addEventListener("change", function(){ state.showGuides = guideToggle.checked; });
      bgSelect.addEventListener("change", function(){ state.bg = bgSelect.value; });
    }

    function drawBg(ctx, w, h){
      ctx.clearRect(0,0,w,h);
      if(state.bg === "field"){
        ctx.fillStyle = "#d7efc5";
        ctx.fillRect(0,0,w,h);
        ctx.fillStyle = "rgba(85,150,87,.18)";
        for(var i=0;i<32;i++){
          var x = (i * 41 + 17) % w;
          var y = (i * 29 + 21) % h;
          ctx.fillRect(x, y, 5, 2);
          ctx.fillRect(x + 2, y - 2, 2, 5);
        }
      }else if(state.bg === "plain"){
        ctx.fillStyle = "#fffaf0";
        ctx.fillRect(0,0,w,h);
      }else{
        ctx.fillStyle = "#f9f6e7";
        ctx.fillRect(0,0,w,h);
        ctx.strokeStyle = "rgba(46,62,102,.12)";
        ctx.lineWidth = 1;
        for(var gx=0;gx<=w;gx+=16){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,h); ctx.stroke(); }
        for(var gy=0;gy<=h;gy+=16){ ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(w,gy); ctx.stroke(); }
      }
    }

    function drawGuides(ctx, cx, footY, size){
      if(!state.showGuides) return;
      ctx.save();
      ctx.strokeStyle = "rgba(38,63,111,.45)";
      ctx.lineWidth = 1;
      ctx.setLineDash([4,4]);
      ctx.beginPath();
      ctx.moveTo(cx, footY - size * .95);
      ctx.lineTo(cx, footY + 8);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx - size * .55, footY);
      ctx.lineTo(cx + size * .55, footY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = "rgba(38,63,111,.9)";
      ctx.font = "900 10px system-ui";
      ctx.textAlign = "center";
      ctx.fillText("foot", cx, footY + 16);
      ctx.restore();
    }

    function withSpriteSpace(ctx, cx, cy, size, draw){
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(size / 96, size / 96);
      draw();
      ctx.restore();
    }

    function drawCape(ctx, view){
      if(view === "back"){
        ctx.fillStyle = "#7278c8";
        ctx.fillRect(-19,-19,38,45);
        ctx.fillStyle = "#5358a8";
        ctx.fillRect(-16,7,32,12);
        return;
      }
      if(view === "front") return;
      ctx.fillStyle = "rgba(114,120,200,.78)";
      ctx.fillRect(-18,-14,34,38);
      ctx.fillStyle = "rgba(83,88,168,.75)";
      ctx.fillRect(-16,8,30,9);
    }

    function drawHat(ctx, view){
      if(view === "back"){
        ctx.fillStyle = "#2d2148";
        ctx.fillRect(-19,-42,38,14);
        ctx.fillRect(-12,-49,24,9);
      }else if(view === "left" || view === "right"){
        ctx.fillStyle = "#2d2148";
        ctx.fillRect(-17,-43,31,12);
        ctx.fillRect(-7,-50,18,9);
      }else{
        ctx.fillStyle = "#2d2148";
        ctx.fillRect(-20,-42,40,13);
        ctx.fillRect(-12,-50,24,9);
      }
      ctx.fillStyle = "#7b4bd1";
      ctx.fillRect(-22,-36,44,5);
      ctx.fillStyle = "#ffe36d";
      ctx.fillRect(-4,-47,8,4);
    }

    function drawWeapon(ctx, view, kind){
      if(kind === "attack") return;
      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.strokeStyle = "#5d3520";
      ctx.lineWidth = 6;
      if(view === "back"){
        ctx.beginPath();
        ctx.moveTo(20,-23);
        ctx.lineTo(27,20);
        ctx.stroke();
      }else if(view === "left"){
        ctx.beginPath();
        ctx.moveTo(-28,-15);
        ctx.lineTo(-12,23);
        ctx.stroke();
      }else if(view === "right"){
        ctx.beginPath();
        ctx.moveTo(28,-15);
        ctx.lineTo(12,23);
        ctx.stroke();
      }else{
        ctx.beginPath();
        ctx.moveTo(23,-12);
        ctx.lineTo(15,27);
        ctx.stroke();
      }
      ctx.strokeStyle = "#dce9f0";
      ctx.lineWidth = 4;
      if(view === "back"){
        ctx.beginPath(); ctx.moveTo(20,-27); ctx.lineTo(27,14); ctx.stroke();
      }else if(view === "left"){
        ctx.beginPath(); ctx.moveTo(-31,-18); ctx.lineTo(-15,18); ctx.stroke();
      }else if(view === "right"){
        ctx.beginPath(); ctx.moveTo(31,-18); ctx.lineTo(15,18); ctx.stroke();
      }else{
        ctx.beginPath(); ctx.moveTo(25,-16); ctx.lineTo(18,21); ctx.stroke();
      }
      ctx.restore();
    }

    function drawPanel(view, now){
      var ctx = view.ctx;
      var canvas = view.canvas;
      var panel = view.panel;
      var w = canvas.width;
      var h = canvas.height;
      var frameIndex = panel.frames.length === 1 ? 0 : Math.floor(now * state.speed) % panel.frames.length;
      var img = images[panel.frames[frameIndex]];
      var size = panel.kind === "attack" ? state.size + 16 : state.size;
      var cx = w / 2;
      var footY = h * .68;
      var cy = footY - size / 2 + 3;
      var bob = 0;
      if(panel.kind === "walk") bob = Math.sin(now * state.speed * Math.PI * 2 / 4) * 3;

      drawBg(ctx, w, h);
      ctx.save();
      ctx.globalAlpha = .22;
      ctx.fillStyle = "#1e2b24";
      ctx.beginPath();
      ctx.ellipse(cx, footY + 7, size * .25, size * .055, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      drawGuides(ctx, cx, footY, size);

      ctx.imageSmoothingEnabled = false;
      if(state.showGear){
        withSpriteSpace(ctx, cx, cy + bob, size, function(){ drawCape(ctx, panel.view); });
      }

      if(img && img.complete && img.naturalWidth){
        ctx.save();
        ctx.translate(Math.round(cx), Math.round(cy + bob));
        if(panel.mirror) ctx.scale(-1, 1);
        ctx.drawImage(img, -size / 2, -size / 2, size, size);
        ctx.restore();
      }else{
        ctx.fillStyle = "#31436f";
        ctx.font = "900 12px system-ui";
        ctx.textAlign = "center";
        ctx.fillText("loading", cx, cy);
      }

      if(state.showGear){
        withSpriteSpace(ctx, cx, cy + bob, size, function(){
          drawWeapon(ctx, panel.view, panel.kind);
          drawHat(ctx, panel.view);
        });
      }

      ctx.fillStyle = "rgba(255,248,220,.92)";
      ctx.fillRect(7, h - 23, 72, 16);
      ctx.strokeStyle = "#263f6f";
      ctx.strokeRect(7.5, h - 22.5, 71, 15);
      ctx.fillStyle = "#263f6f";
      ctx.font = "900 10px system-ui";
      ctx.textAlign = "left";
      ctx.fillText("frame " + (frameIndex + 1) + "/" + panel.frames.length, 12, h - 11);
    }

    function tick(ts){
      if(!state.last) state.last = ts;
      var dt = Math.min(0.05, (ts - state.last) / 1000);
      state.last = ts;
      if(state.playing) state.time += dt;
      views.forEach(function(view){ drawPanel(view, state.time); });
      requestAnimationFrame(tick);
    }

    build();
    setupControls();
    requestAnimationFrame(tick);
  })();
  </script>
</body>
</html>
